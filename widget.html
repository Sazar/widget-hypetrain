<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Barlow+Condensed:wght@700;900&family=Bebas+Neue&family=Russo+One&family=Black+Han+Sans&display=swap" rel="stylesheet">

<div id="ht-widget" class="hidden">
  <div class="ht-bar">

    <!-- Barre de fond + fill -->
    <div class="ht-fill" id="ht-fill"></div>

    <!-- Bulle LVL + timer : absolue a gauche, par-dessus tout -->
    <div class="ht-info">
      <div class="ht-badge">
        <span class="ht-level" id="ht-level">LVL 1</span>
      </div>
      <span class="ht-timer" id="ht-timer">05:00</span>
    </div>

    <!-- Pourcentage : absolu a droite, par-dessus tout -->
    <span class="ht-pct" id="ht-pct">0%</span>

  </div>
</div>
