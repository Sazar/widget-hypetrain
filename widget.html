<!-- Hype Train Widget - StreamElements -->
<div id="hype-train-widget" class="hype-hidden">

  <!-- Header : icone locomotive + titre + level badge -->
  <div class="ht-header">
    <div class="ht-train-icon">
      <svg viewBox="0 0 36 20" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="1" y="3" width="28" height="13" rx="3" fill="currentColor" opacity="0.9"/>
        <rect x="5" y="6" width="6" height="5" rx="1" fill="white" opacity="0.4"/>
        <rect x="13" y="6" width="6" height="5" rx="1" fill="white" opacity="0.4"/>
        <rect x="21" y="6" width="5" height="5" rx="1" fill="white" opacity="0.4"/>
        <circle cx="7" cy="17" r="3" fill="currentColor" stroke="white" stroke-width="1.2"/>
        <circle cx="19" cy="17" r="3" fill="currentColor" stroke="white" stroke-width="1.2"/>
        <rect x="29" y="7" width="6" height="6" rx="1" fill="currentColor" opacity="0.7"/>
      </svg>
    </div>
    <span class="ht-title">HYPE TRAIN</span>
    <div class="ht-level-badge">
      <span class="ht-level-label">LEVEL</span>
      <span class="ht-level-value" id="ht-level">1</span>
    </div>
  </div>

  <!-- Barre de progression -->
  <div class="ht-bar-container">
    <div class="ht-bar-track">
      <div class="ht-bar-fill" id="ht-bar">
        <div class="ht-bar-shine"></div>
        <div class="ht-bar-particles" id="ht-particles"></div>
      </div>
    </div>
  </div>

  <!-- Footer : timer a gauche, pourcentage a droite -->
  <div class="ht-footer">
    <div class="ht-timer" id="ht-timer">
      <svg class="ht-timer-icon" viewBox="0 0 16 16" fill="none">
        <circle cx="8" cy="9" r="6" stroke="currentColor" stroke-width="1.5"/>
        <path d="M8 6v3.5l2 1.2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M6 1h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M8 1v2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <span id="ht-timer-text">5:00</span>
    </div>
    <div class="ht-percent" id="ht-percent-wrapper">
      <span id="ht-percent">0%</span>
      <span class="ht-next-label">prochain niveau</span>
    </div>
  </div>

</div>
